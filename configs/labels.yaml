# Total Segmentator v1 Label Definitions
# Reference: Wasserthal et al., "TotalSegmentator: Robust Segmentation of 104
#            Anatomical Structures in CT Images", Radiology: AI, 2023
#
# This file defines:
#   1. all_labels  — complete label map (104 classes, values 1~104)
#   2. bone_groups — grouped bone structures with their source label IDs
#   3. active_groups — which groups to use in segmentation task
#
# NOTE: If using Total Segmentator v2 (117 classes), some label IDs may differ.
#       Run `python scripts/inspect_labels.py` first to verify actual label values.

# ─────────────────────────────────────────────────────────────────────────────
# Complete Total Segmentator v1 label map (for reference / inspection)
# ─────────────────────────────────────────────────────────────────────────────
